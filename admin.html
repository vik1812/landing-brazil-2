<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 24px;
      color: #1f2937;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .grid-full {
      grid-column: 1 / -1;
    }

    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      border: 0;
      font-weight: 700;
    }

    .btn-primary {
      background: #111827;
      color: #fff;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
      width: auto;
      padding: 10px 14px;
    }

    .btn-edit {
      background: #2563eb;
      color: #fff;
      width: auto;
      padding: 10px 14px;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .row-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .bookmaker-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .bookmaker-item img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
    }

    .bookmaker-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .message {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .form-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
    }

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.topbar-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn-logout {
  background: #111827;
  color: #fff;
  width: auto;
  padding: 10px 16px;
}

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .bookmaker-item {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
  <div class="topbar">
    <h1>Admin Panel</h1>
    <div class="topbar-actions">
      <button id="topLogoutBtn" class="btn-logout hidden" type="button">Sign Out</button>
    </div>
  </div>

    <div id="messageBox" class="message hidden"></div>

    <div id="loginCard" class="card">
      <h2>Admin Login</h2>
      <div class="grid">
        <div>
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Admin email" />
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Admin password" />
        </div>
        <div class="grid-full row-actions">
          <button class="btn-primary" id="loginBtn" type="button">Login</button>
          <button class="btn-secondary" id="logoutBtn" type="button">Logout</button>
        </div>
      </div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="card">
        <div class="form-title-row">
          <div>
            <h2 id="formTitle">Add Bookmaker</h2>
            <span id="editTag" class="tag hidden">Editing mode</span>
          </div>
          <button id="cancelEditBtn" class="btn-secondary hidden" type="button">Cancel Edit</button>
        </div>

        <form id="bookmakerForm">
          <div class="grid">
            <div>
              <label>Name</label>
              <input type="text" id="name" required />
            </div>
            <div>
              <label>Slug</label>
              <input type="text" id="slug" required />
            </div>
            <div>
              <label>Logo URL</label>
              <input type="text" id="logo_url" />
            </div>
            <div>
              <label>Rating</label>
              <input type="number" step="0.1" id="rating" />
            </div>
            <div class="grid-full">
              <label>Short Description</label>
              <textarea id="short_description"></textarea>
            </div>
            <div class="grid-full">
  <label>Features Text</label>
  <input type="text" id="features_text" placeholder="Example: Fast payouts | Mobile app | Welcome bonus" />
  <small style="display:block; margin-top:6px; color:#6b7280;">
    Use | to separate feature items. Example: Fast payouts | Mobile app | Welcome bonus
  </small>
</div>
<div class="grid-full">
  <div id="logoPreviewWrap" style="display:flex; align-items:center; gap:12px; margin-top:4px;">
    <div style="width:64px; height:64px; border-radius:14px; background:#fff; border:1px solid #e5e7eb; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:8px;">
      <img id="logoPreview" src="" alt="Logo preview" style="max-width:100%; max-height:100%; object-fit:contain; display:none;" />
    </div>
    <span class="muted">Logo preview</span>
  </div>
</div>
            <div>
              <label>Promo Title</label>
              <input type="text" id="promo_title" />
            </div>
            <div>
              <label>Promo Text</label>
              <input type="text" id="promo_text" />
            </div>
            <div>
              <label>Affiliate Link</label>
              <input type="text" id="affiliate_link" required />
            </div>
            <div>
              <label>Review Link</label>
              <input type="text" id="review_link" />
            </div>
            <div>
              <label>Rank Order</label>
              <input type="number" id="rank_order" required />
            </div>
            <div>
              <label>Active</label>
              <select id="is_active">
                <option value="true">Yes</option>
                <option value="false">No</option>
              </select>
            </div>
            <div class="grid-full row-actions">
              <button class="btn-primary" type="submit" id="submitBtn">Save Bookmaker</button>
            </div>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Existing Bookmakers</h2>
        <div id="bookmakersAdminList"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    const supabaseUrl = 'https://zmushwvwnmirnhbqvswv.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptdXNod3Z3bm1pcm5oYnF2c3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTQxNTUsImV4cCI6MjA5MDI5MDE1NX0.9Hi630N-tJ7xDOD88KZLRvjHjLxPtQlaAFAxni1NTN8'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const loginCard = document.getElementById('loginCard')
    const topLogoutBtn = document.getElementById('topLogoutBtn')
    const adminPanel = document.getElementById('adminPanel')
    const logoUrlInput = document.getElementById('logo_url')
    const logoPreview = document.getElementById('logoPreview')
    const loginBtn = document.getElementById('loginBtn')
    const logoutBtn = document.getElementById('logoutBtn')
    const messageBox = document.getElementById('messageBox')
    const bookmakersAdminList = document.getElementById('bookmakersAdminList')
    const bookmakerForm = document.getElementById('bookmakerForm')
    const formTitle = document.getElementById('formTitle')
    const submitBtn = document.getElementById('submitBtn')
    const cancelEditBtn = document.getElementById('cancelEditBtn')
    const editTag = document.getElementById('editTag')

    let editingId = null

    function showMessage(text, type = 'success') {
      messageBox.textContent = text
      messageBox.className = `message ${type}`
      messageBox.classList.remove('hidden')
    }

    function hideMessage() {
      messageBox.classList.add('hidden')
    }

    function updateLogoPreview(url) {
  if (url && url.trim() !== '') {
    logoPreview.src = url.trim()
    logoPreview.style.display = 'block'
  } else {
    logoPreview.src = ''
    logoPreview.style.display = 'none'
  }
}
logoUrlInput.addEventListener('input', (e) => {
  updateLogoPreview(e.target.value)
})

    function resetForm() {
      bookmakerForm.reset()
      editingId = null
      formTitle.textContent = 'Add Bookmaker'
      submitBtn.textContent = 'Save Bookmaker'
      cancelEditBtn.classList.add('hidden')
      editTag.classList.add('hidden')
      updateLogoPreview('')
    }

    function fillForm(bookmaker) {
      document.getElementById('name').value = bookmaker.name ?? ''
      document.getElementById('slug').value = bookmaker.slug ?? ''
      document.getElementById('logo_url').value = bookmaker.logo_url ?? ''
      document.getElementById('rating').value = bookmaker.rating ?? ''
      document.getElementById('short_description').value = bookmaker.short_description ?? ''
      document.getElementById('features_text').value = bookmaker.features_text ?? ''
      document.getElementById('promo_title').value = bookmaker.promo_title ?? ''
      document.getElementById('promo_text').value = bookmaker.promo_text ?? ''
      document.getElementById('affiliate_link').value = bookmaker.affiliate_link ?? ''
      document.getElementById('review_link').value = bookmaker.review_link ?? ''
      document.getElementById('rank_order').value = bookmaker.rank_order ?? ''
      document.getElementById('is_active').value = bookmaker.is_active ? 'true' : 'false'

      updateLogoPreview(bookmaker.logo_url ?? '')

      editingId = bookmaker.id
      formTitle.textContent = `Edit Bookmaker: ${bookmaker.name}`
      submitBtn.textContent = 'Update Bookmaker'
      cancelEditBtn.classList.remove('hidden')
      editTag.classList.remove('hidden')

      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    async function checkSession() {
  const { data } = await supabase.auth.getSession()
  const session = data.session

  if (session) {
    loginCard.classList.add('hidden')
    adminPanel.classList.remove('hidden')
    topLogoutBtn.classList.remove('hidden')
    loadAdminBookmakers()
  } else {
    loginCard.classList.remove('hidden')
    adminPanel.classList.add('hidden')
    topLogoutBtn.classList.add('hidden')
  }
  
}

    loginBtn.addEventListener('click', async () => {
      hideMessage()

      const email = document.getElementById('loginEmail').value.trim()
      const password = document.getElementById('loginPassword').value.trim()

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        showMessage(error.message, 'error')
        return
      }

      showMessage('Login successful')
      checkSession()
    })

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut()
      showMessage('Logged out successfully')
      checkSession()
    })

    cancelEditBtn.addEventListener('click', () => {
      resetForm()
      hideMessage()
    })

    topLogoutBtn.addEventListener('click', async () => {
  await supabase.auth.signOut()
  showMessage('Signed out successfully')
  checkSession()
})

    async function loadAdminBookmakers() {
      const { data, error } = await supabase
        .from('bookmakers')
        .select('*')
        .order('rank_order', { ascending: true })

      if (error) {
        showMessage(error.message, 'error')
        return
      }

      bookmakersAdminList.innerHTML = ''

      if (!data || data.length === 0) {
        bookmakersAdminList.innerHTML = '<p>No bookmakers found.</p>'
        return
      }

      data.forEach((bookmaker) => {
        const item = document.createElement('div')
        item.className = 'bookmaker-item'

        item.innerHTML = `
          <div class="bookmaker-left">
            <img src="${bookmaker.logo_url || 'https://via.placeholder.com/64'}" alt="${bookmaker.name}">
            <div>
              <strong>${bookmaker.name}</strong>
              <div class="muted">Slug: ${bookmaker.slug}</div>
              <div class="muted">Rank: ${bookmaker.rank_order} | Active: ${bookmaker.is_active ? 'Yes' : 'No'}</div>
              <div class="muted">${bookmaker.short_description || ''}</div>
            </div>
          </div>
          <div class="row-actions">
            <button class="btn-edit" data-action="edit">Edit</button>
            <button class="btn-danger" data-action="delete">Delete</button>
          </div>
        `

        const editBtn = item.querySelector('[data-action="edit"]')
        const deleteBtn = item.querySelector('[data-action="delete"]')

        editBtn.addEventListener('click', () => {
          fillForm(bookmaker)
        })

        deleteBtn.addEventListener('click', async () => {
          const confirmed = confirm(`Do you want to delete ${bookmaker.name}?`)
          if (!confirmed) return

          const { error } = await supabase
            .from('bookmakers')
            .delete()
            .eq('id', bookmaker.id)

          if (error) {
            showMessage(error.message, 'error')
            return
          }

          if (editingId === bookmaker.id) {
            resetForm()
          }

          showMessage('Bookmaker deleted successfully')
          loadAdminBookmakers()
        })

        bookmakersAdminList.appendChild(item)
      })
    }

    bookmakerForm.addEventListener('submit', async (e) => {
      e.preventDefault()
      hideMessage()

      const payload = {
        name: document.getElementById('name').value.trim(),
        slug: document.getElementById('slug').value.trim(),
        logo_url: document.getElementById('logo_url').value.trim(),
        rating: document.getElementById('rating').value ? Number(document.getElementById('rating').value) : null,
        short_description: document.getElementById('short_description').value.trim(),
        features_text: document.getElementById('features_text').value.trim(),
        promo_title: document.getElementById('promo_title').value.trim(),
        promo_text: document.getElementById('promo_text').value.trim(),
        affiliate_link: document.getElementById('affiliate_link').value.trim(),
        review_link: document.getElementById('review_link').value.trim(),
        rank_order: Number(document.getElementById('rank_order').value),
        is_active: document.getElementById('is_active').value === 'true'
      }

      let error = null

      if (editingId) {
        const response = await supabase
          .from('bookmakers')
          .update(payload)
          .eq('id', editingId)

        error = response.error
      } else {
        const response = await supabase
          .from('bookmakers')
          .insert([payload])

        error = response.error
      }

      if (error) {
        showMessage(error.message, 'error')
        return
      }

      showMessage(editingId ? 'Bookmaker updated successfully' : 'Bookmaker saved successfully')
      resetForm()
      loadAdminBookmakers()
    })

    checkSession()
  </script>
</body>
</html>
